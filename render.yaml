# render.yaml — Render.com deployment config
# Deploy both services from a single repo

services:
  # ─── Backend API ──────────────────────────────────────────────────────
  - type: web
    name: sakshamai-api
    env: node
    region: singapore   # closest to India
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false        # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: HUGGINGFACE_API_KEY
        sync: false        # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false        # set to your Vercel/Netlify frontend URL

  # ─── Frontend ─────────────────────────────────────────────────────────
  - type: web
    name: sakshamai-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false        # set to your Render API URL, e.g. https://sakshamai-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html  # enables React Router client-side routing
